model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.react-aria]
command = "npx"
args = ["@react-aria/mcp@latest"]

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.uidotsh]
url = "https://ui.sh/mcp?agent=codex"
env_http_headers = { Authorization = "UIDOTSH_MCP_AUTHORIZATION" }

[mcp_servers.uidotsh.tools.uidotsh_fetch]
approval_mode = "approve"

[features]
multi_agent = true

[plugins."github@openai-curated"]
enabled = true

[plugins."sentry@openai-curated"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."vercel@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true
